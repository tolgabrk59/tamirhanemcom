<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Ödeme Yöntemleri - TamirHanem">
  <title>Ödeme Yöntemleri | TamirHanem</title>

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">

  <!-- Global Dashboard CSS -->
  <link rel="stylesheet" href="/css/global-dashboard.css">

  <!-- Config (API URL) -->
  <script src="/js/config.js"></script>

  <style>
    /* --- PAGE SPECIFIC STYLES --- */
    /* Footer altı boşluk fix */
    html { height: 100%; }
    body { min-height: 100%; margin: 0; padding: 0; display: flex; flex-direction: column; zoom: 0.765; }
    .dashboard-main { flex: 1 0 auto; min-height: 60vh; padding-top: 40px; padding-bottom: 100px; }
    .dashboard-footer { flex-shrink: 0; margin-bottom: 0 !important; }

    /* Page Header */
    .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .page-header-left { display: flex; flex-direction: column; }
    .page-header-left h1, .page-header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; color: #2d2d2d; font-weight: 700; }
    .page-header-left h1 i, .page-header h1 i { color: #fbc707; font-size: 1.5rem; }
    .page-header-left p, .page-header p { font-size: 0.9rem; color: #64748b; margin: 0; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.3s; border: none; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, #fbc707 0%, #eeb902 100%); color: #2d2d2d; box-shadow: 0 4px 12px rgba(251, 199, 7, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(251, 199, 7, 0.4); }

    /* Form Elements */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: #454545; margin-bottom: 8px; }
    .form-input, .form-select { width: 100%; padding: 14px 16px; border: 2px solid #eee; border-radius: 10px; font-family: inherit; font-size: 0.95rem; color: #2d2d2d; background: #f8f9fa; transition: all 0.2s; box-sizing: border-box; }
    .form-input:focus, .form-select:focus { border-color: #fbc707; background: #fff; box-shadow: 0 0 0 4px rgba(251, 199, 7, 0.15); outline: none; }
    .form-input::placeholder { color: #aaa; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(4px); }
    .modal-overlay.show, .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal-content { background: #fff; width: 90%; max-width: 500px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2); transform: translateY(20px); transition: transform 0.3s ease; overflow: hidden; }
    .modal-overlay.show .modal-content, .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-header { padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; }
    .modal-header h2, .modal-header h3 { margin: 0; font-size: 1.1rem; color: #1e293b; display: flex; align-items: center; gap: 10px; }
    .modal-header h2 i, .modal-header h3 i { color: #fbc707; }
    .modal-close, .close-modal-btn { background: none; border: none; font-size: 1.2rem; color: #64748b; cursor: pointer; padding: 5px; border-radius: 50%; transition: background 0.2s; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover, .close-modal-btn:hover { background: #e2e8f0; color: #ef4444; }
    .modal-body { padding: 24px; max-height: 60vh; overflow-y: auto; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; gap: 12px; background: #f8fafc; }
    .btn-cancel { padding: 10px 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff; color: #64748b; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-cancel:hover { background: #f1f5f9; color: #334155; }
    .btn-save { padding: 10px 24px; border-radius: 8px; border: none; background: linear-gradient(135deg, #fbc707 0%, #eeb902 100%); color: #2d2d2d; font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(251, 199, 7, 0.3); }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(251, 199, 7, 0.4); }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; background: #fff; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .empty-state-icon { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #fbc707 0%, #eeb902 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 2.5rem; color: #2d2d2d; }
    .empty-state h3 { font-size: 1.25rem; margin-bottom: 10px; color: #2d2d2d; font-weight: 700; }
    .empty-state p { color: #64748b; max-width: 300px; margin: 0 auto; font-size: 0.9rem; }

    /* Toast */
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); font-weight: 600; font-size: 0.9rem; }
    .toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
    .toast.error { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); }
    .toast i { font-size: 1.25rem; }

    /* Add Card Button */

    .add-card-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary) 0%, #eeb902 100%);
      color: var(--neutral-900);
      border: none;
      padding: 12px 20px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 6px 16px rgba(251, 199, 7, 0.3);
    }

    .add-card-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(251, 199, 7, 0.4);
    }

    /* Cards Grid */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    @media (max-width: 768px) {
      .cards-grid {
        justify-content: center;
      }
    }

    /* Credit Card */
    .credit-card {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      transition: all 0.3s var(--ease);
      cursor: pointer;
      position: relative;
      width: 300px;
      height: 175px;
      flex-shrink: 0;
    }

    .credit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .card-gradient {
      padding: 14px 16px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .card-gradient::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .card-brand-logo {
      font-size: 0.75rem;
      font-weight: 800;
      color: white;
      letter-spacing: 1px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .card-contactless {
      color: rgba(255, 255, 255, 0.85);
      font-size: 1.1rem;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.2));
    }

    .card-chip-row {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 1;
      margin-top: -2px;
    }

    .card-chip {
      width: 35px;
      height: 26px;
      background: linear-gradient(135deg, #f0d78c 0%, #d4af37 50%, #f0d78c 100%);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.5), 0 1px 2px rgba(0, 0, 0, 0.15);
      position: relative;
      overflow: hidden;
    }

    .card-chip::before {
      content: '';
      position: absolute;
      width: 55%;
      height: 60%;
      border: 1px solid rgba(139, 119, 42, 0.5);
      border-radius: 2px;
    }

    .card-chip::after {
      content: '';
      position: absolute;
      width: 22%;
      height: 40%;
      left: 12%;
      border-right: 1px solid rgba(139, 119, 42, 0.5);
    }

    .card-number {
      font-size: 1rem;
      font-weight: 600;
      color: white;
      letter-spacing: 2px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }

    .card-holder-section {
      flex: 1;
      max-width: 60%;
    }

    .card-holder-label,
    .card-expiry-label {
      font-size: 0.45rem;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      margin-bottom: 1px;
      letter-spacing: 0.5px;
    }

    .card-holder-name {
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-bank-name {
      font-size: 0.55rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 1px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-expiry-section {
      text-align: right;
    }

    .card-expiry-date {
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
      font-family: 'Courier New', monospace;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
    }

    .card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .credit-card:hover .card-actions {
      opacity: 1;
    }

    .card-action-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .card-action-btn:hover {
      transform: scale(1.1);
    }

    .card-action-btn.edit-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .card-action-btn.delete-btn:hover {
      background: var(--error);
    }

    .card-action-btn i {
      font-size: 0.75rem;
      color: white;
    }

    /* Card Brand Gradients */
    .card-ziraat {
      background: linear-gradient(135deg, #DC143C 0%, #B22222 100%);
    }

    .card-isbank {
      background: linear-gradient(135deg, #003366 0%, #0066CC 100%);
    }

    .card-garanti {
      background: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
    }

    .card-yapikredi {
      background: linear-gradient(135deg, #1E90FF 0%, #4169E1 100%);
    }

    .card-vakifbank {
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    }

    .card-vakifbank .card-brand-logo,
    .card-vakifbank .card-number,
    .card-vakifbank .card-holder-name,
    .card-vakifbank .card-expiry-date {
      color: #1a1a1a !important;
      text-shadow: none !important;
    }

    .card-vakifbank .card-holder-label,
    .card-vakifbank .card-expiry-label {
      color: rgba(0, 0, 0, 0.6) !important;
    }

    .card-vakifbank .card-bank-name {
      color: rgba(0, 0, 0, 0.7) !important;
    }

    .card-vakifbank .card-contactless {
      color: rgba(0, 0, 0, 0.8) !important;
      filter: none !important;
    }

    .card-halkbank {
      background: linear-gradient(135deg, #4169E1 0%, #6495ED 100%);
    }

    .card-akbank {
      background: linear-gradient(135deg, #FF6600 0%, #FF8C00 100%);
    }

    .card-qnb {
      background: linear-gradient(135deg, #191970 0%, #4169E1 100%);
    }

    .card-denizbank {
      background: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
    }

    .card-teb {
      background: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
    }

    .card-ing {
      background: linear-gradient(135deg, #FF6200 0%, #FF8C00 100%);
    }

    .card-hsbc {
      background: linear-gradient(135deg, #DC143C 0%, #B22222 100%);
    }

    .card-kuveytturk {
      background: linear-gradient(135deg, #4682B4 0%, #708090 100%);
    }

    .card-albaraka {
      background: linear-gradient(135deg, #9370DB 0%, #8A2BE2 100%);
    }

    .card-sekerbank {
      background: linear-gradient(135deg, #228B22 0%, #32CD32 100%);
    }

    .card-fibabanka {
      background: linear-gradient(135deg, #191970 0%, #2F4F4F 100%);
    }

    .card-odeabank {
      background: linear-gradient(135deg, #4682B4 0%, #708090 100%);
    }

    .card-burgan {
      background: linear-gradient(135deg, #1E90FF 0%, #4169E1 100%);
    }

    .card-visa {
      background: linear-gradient(135deg, #1A1F71 0%, #00579F 100%);
    }

    .card-mastercard {
      background: linear-gradient(135deg, #EB001B 0%, #FF5F00 100%);
    }

    .card-unknown {
      background: linear-gradient(135deg, #6C757D 0%, #495057 100%);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }

    .empty-state-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, #eeb902 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.5rem;
      color: var(--neutral-900);
    }

    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      color: var(--neutral-500);
      max-width: 300px;
      margin: 0 auto 24px;
      font-size: 0.9rem;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: var(--white);
      border-radius: var(--radius-xl);
      width: 100%;
      max-width: 420px;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalSlide 0.3s var(--ease);
    }

    @keyframes modalSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-bottom: 1px solid var(--neutral-100);
    }

    .modal-header h2 {
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-header h2 i {
      color: var(--primary);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--neutral-100);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1.1rem;
      color: var(--neutral-500);
    }

    .modal-close:hover {
      background: var(--error-bg);
      color: var(--error);
    }

    .modal-body {
      padding: 20px;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--primary-light);
      padding: 14px;
      border-radius: var(--radius-md);
      margin-top: 16px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
      margin-top: 2px;
      flex-shrink: 0;
    }

    .checkbox-group span {
      font-size: 0.85rem;
      color: var(--neutral-700);
      line-height: 1.4;
    }

    .modal-footer {
      padding: 20px;
      border-top: 1px solid var(--neutral-100);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      background: linear-gradient(135deg, var(--primary) 0%, #eeb902 100%);
      color: var(--neutral-900);
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(251, 199, 7, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(251, 199, 7, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Card Preview in Modal */
    .card-preview-container {
      margin-bottom: 20px;
    }

    .card-preview {
      border-radius: 12px;
      padding: 16px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: white;
      background: linear-gradient(135deg, #6C757D, #495057);
      transition: all 0.5s;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: linear-gradient(135deg, #10B981, #059669);
      color: white;
      padding: 14px 24px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s var(--ease);
    }

    .toast.error {
      background: linear-gradient(135deg, #EF4444, #DC2626);
      box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <!-- Header and Loyalty Bar will be injected by global-header.js -->

  <!-- Main Content -->
  <main class="dashboard-main">
    <div class="container">
      <!-- Page Header -->
      <div class="page-header">
        <div class="page-header-left">
          <h1><i class="ri-bank-card-fill"></i> Ödeme Yöntemleri</h1>
          <p>Kayıtlı kartlarınızı yönetin</p>
        </div>
        <button class="add-card-btn" onclick="openAddCardModal()">
          <i class="ri-add-line"></i> Yeni Kart Ekle
        </button>
      </div>

      <!-- Content Container -->
      <div id="content-container">
        <div class="loading-container">
          <div class="spinner"></div>
          <p style="color: var(--neutral-500); font-size: 0.9rem;">Kartlar yükleniyor...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Add Card Modal -->
  <div class="modal-overlay" id="addCardModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2><i class="ri-bank-card-line"></i> Yeni Kart Ekle</h2>
        <button class="modal-close" onclick="closeAddCardModal()">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="modal-body">
        <!-- Card Preview -->
        <div class="card-preview-container">
          <div class="card-preview" id="cardPreview">
            <div class="card-top">
              <span class="card-brand-logo" id="previewBrand">KART</span>
              <div class="card-chip"><i class="ri-wifi-line"></i></div>
            </div>
            <div class="card-middle">
              <div class="card-number" id="previewNumber">**** **** **** ****</div>
            </div>
            <div class="card-bottom">
              <div class="card-holder-section">
                <div class="card-holder-label">KART SAHİBİ</div>
                <div class="card-holder-name" id="previewHolder">AD SOYAD</div>
              </div>
              <div class="card-expiry-section">
                <div class="card-expiry-label">SON KULLANMA</div>
                <div class="card-expiry-date" id="previewExpiry">AA/YY</div>
              </div>
            </div>
          </div>
        </div>

        <form id="addCardForm">
          <div class="form-group">
            <label>Kart Üzerindeki İsim</label>
            <input type="text" id="holderName" placeholder="Ad Soyad" required>
          </div>
          <div class="form-group">
            <label>Kart Numarası</label>
            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Son Kullanma</label>
              <input type="text" id="expiryDate" placeholder="AA/YY" maxlength="5" required>
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="password" id="cvv" placeholder="***" maxlength="4" required autocomplete="cc-csc">
            </div>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="saveCard" checked>
            <span>Kartımı gelecek ödemeler için güvenli bir şekilde sakla</span>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="submit" class="submit-btn submit-card-btn" id="submitBtn" onclick="saveCard()">
          <i class="ri-check-line"></i> Kartı Kaydet
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <i class="ri-checkbox-circle-fill" id="toast-icon"></i>
    <span id="toast-message">Mesaj</span>
  </div>

  <!-- Bottom Nav will be injected here by bottom-nav.js -->

  <div id="global-loading">
    <div class="spinner"></div>
  </div>

  <!-- Global Header Component -->
  <script src="/components/global-header.js"></script>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components/footer.js"></script>
  <script src="/js/components/bottom-nav.js"></script>

  <script>
    let allCards = [];
    let editingCardId = null;

    const cardBrandClasses = {
      'ziraat': 'card-ziraat', 'isbank': 'card-isbank', 'garanti': 'card-garanti',
      'yapikredi': 'card-yapikredi', 'vakifbank': 'card-vakifbank', 'halkbank': 'card-halkbank',
      'akbank': 'card-akbank', 'qnb': 'card-qnb', 'denizbank': 'card-denizbank',
      'teb': 'card-teb', 'ing': 'card-ing', 'hsbc': 'card-hsbc',
      'kuveytturk': 'card-kuveytturk', 'albaraka': 'card-albaraka', 'sekerbank': 'card-sekerbank',
      'fibabanka': 'card-fibabanka', 'odeabank': 'card-odeabank', 'burgan': 'card-burgan',
      'visa': 'card-visa', 'mastercard': 'card-mastercard'
    };

    const cardBrandNames = {
      'ziraat': 'ZİRAAT', 'isbank': 'İŞ BANKASI', 'garanti': 'GARANTİ',
      'yapikredi': 'YAPI KREDİ', 'vakifbank': 'VAKIFBANK', 'halkbank': 'HALKBANK',
      'akbank': 'AKBANK', 'qnb': 'QNB', 'denizbank': 'DENİZBANK',
      'teb': 'TEB', 'ing': 'ING', 'hsbc': 'HSBC',
      'kuveytturk': 'KUVEYT TÜRK', 'albaraka': 'ALBARAKA', 'sekerbank': 'ŞEKERBANK',
      'fibabanka': 'FİBABANKA', 'odeabank': 'ODEABANK', 'burgan': 'BURGAN',
      'visa': 'VISA', 'mastercard': 'MASTERCARD'
    };

    function detectBrandFromBankName(bankName) {
      if (!bankName) return 'unknown';
      const name = bankName.toLowerCase();
      if (name.includes('ziraat')) return 'ziraat';
      if (name.includes('iş') || name.includes('is ') || name.includes('isbank')) return 'isbank';
      if (name.includes('garanti')) return 'garanti';
      if (name.includes('yapı') || name.includes('yapi') || name.includes('ykb')) return 'yapikredi';
      if (name.includes('vakıf') || name.includes('vakif')) return 'vakifbank';
      if (name.includes('halk')) return 'halkbank';
      if (name.includes('akbank')) return 'akbank';
      if (name.includes('qnb') || name.includes('finans')) return 'qnb';
      if (name.includes('deniz')) return 'denizbank';
      if (name.includes('teb')) return 'teb';
      if (name.includes('ing')) return 'ing';
      if (name.includes('hsbc')) return 'hsbc';
      if (name.includes('kuveyt')) return 'kuveytturk';
      if (name.includes('albaraka')) return 'albaraka';
      if (name.includes('şeker') || name.includes('seker')) return 'sekerbank';
      if (name.includes('fiba')) return 'fibabanka';
      if (name.includes('odea')) return 'odeabank';
      if (name.includes('burgan')) return 'burgan';
      return 'unknown';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html';
        return;
      }
      await loadCards();
      setupCardForm();
    });

    async function loadCards() {
      const container = document.getElementById('content-container');
      try {
        const user = auth.getUser();
        if (!user) throw new Error('Kullanıcı bulunamadı');

        const token = auth.getToken();
        if (!token) throw new Error('Oturum bulunamadı');

        const response = await fetch(
          `${CONFIG.API_BASE_URL}/credit-cards?populate=user`,
          {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          }
        );

        if (!response.ok) throw new Error('Kartlar yüklenemedi');

        const data = await response.json();
        if (data?.data && Array.isArray(data.data)) {
          allCards = data.data;
        } else if (Array.isArray(data)) {
          allCards = data;
        } else {
          allCards = [];
        }
        renderCards();

      } catch (error) {
        console.error('Kartlar yüklenirken hata:', error);
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="ri-error-warning-line"></i></div>
            <h3>Bir Hata Oluştu</h3>
            <p>${error.message}</p>
            <button class="add-card-btn" onclick="loadCards()">
              <i class="ri-refresh-line"></i> Tekrar Dene
            </button>
          </div>
        `;
      }
    }

    function renderCards() {
      const container = document.getElementById('content-container');
      if (allCards.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><i class="ri-bank-card-line"></i></div>
            <h3>Henüz Kayıtlı Kartınız Yok</h3>
            <p>Ödeme işlemlerini hızlandırmak için sağ üstteki "Yeni Kart Ekle" butonunu kullanabilirsiniz.</p>
          </div>
        `;
        return;
      }

      let html = '<div class="cards-grid">';
      allCards.forEach((card) => {
        const attrs = card.attributes || card;
        const bankName = attrs.bankName || '';
        let brand = (attrs.cardBrand || '').toLowerCase();
        if (!brand || brand === 'unknown') {
          brand = detectBrandFromBankName(bankName);
        }
        const brandClass = cardBrandClasses[brand] || 'card-unknown';
        const brandName2 = cardBrandNames[brand] || bankName || 'KART';
        const lastFour = attrs.cardNumber ? attrs.cardNumber.slice(-4) : '****';
        const holderNameEscaped = (attrs.holderName || '').replace(/'/g, "\\'");

        html += `
          <div class="credit-card ${brandClass}">
            <div class="card-actions">
              <button class="card-action-btn edit-btn" onclick="event.stopPropagation(); openEditCardModal(${card.id})" title="Düzenle">
                <i class="ri-pencil-line"></i>
              </button>
              <button class="card-action-btn delete-btn" onclick="event.stopPropagation(); deleteCard(${card.id}, '${holderNameEscaped}')" title="Sil">
                <i class="ri-delete-bin-line"></i>
              </button>
            </div>
            <div class="card-gradient">
              <div class="card-header">
                <span class="card-brand-logo">${brandName2}</span>
                <i class="ri-wifi-line card-contactless"></i>
              </div>
              <div class="card-chip-row">
                <div class="card-chip"></div>
                <div class="card-number">•••• •••• •••• ${lastFour}</div>
              </div>
              <div class="card-bottom">
                <div class="card-holder-section">
                  <div class="card-holder-label">KART SAHİBİ</div>
                  <div class="card-holder-name">${(attrs.holderName || 'İSİM YOK').toUpperCase()}</div>
                  ${bankName ? `<div class="card-bank-name">${bankName}</div>` : ''}
                </div>
                <div class="card-expiry-section">
                  <div class="card-expiry-label">GEÇ. TARİH</div>
                  <div class="card-expiry-date">${attrs.expiryDate || 'AA/YY'}</div>
                </div>
              </div>
            </div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function setupCardForm() {
      const cardNumberInput = document.getElementById('cardNumber');
      const expiryInput = document.getElementById('expiryDate');
      const holderInput = document.getElementById('holderName');

      cardNumberInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        value = value.replace(/(.{4})/g, '$1 ').trim();
        e.target.value = value;
        updateCardPreview();
      });

      expiryInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length >= 2) {
          value = value.slice(0, 2) + '/' + value.slice(2, 4);
        }
        e.target.value = value;
        updateCardPreview();
      });

      holderInput.addEventListener('input', updateCardPreview);
    }

    function updateCardPreview() {
      const cardNumber = document.getElementById('cardNumber').value;
      const holderName = document.getElementById('holderName').value;
      const expiryDate = document.getElementById('expiryDate').value;

      document.getElementById('previewNumber').textContent = cardNumber || '**** **** **** ****';
      document.getElementById('previewHolder').textContent = holderName ? holderName.toUpperCase() : 'AD SOYAD';
      document.getElementById('previewExpiry').textContent = expiryDate || 'AA/YY';

      const cleanNumber = cardNumber.replace(/\s/g, '');
      if (cleanNumber.length >= 1) {
        const brand = detectCardBrand(cleanNumber);
        const preview = document.getElementById('cardPreview');
        preview.className = 'card-preview';
        preview.style.background = getCardGradient(brand);
        document.getElementById('previewBrand').textContent = cardBrandNames[brand] || 'KART';
      }
    }

    function detectCardBrand(number) {
      const firstDigit = number[0];
      const firstTwo = number.substring(0, 2);
      const firstFour = number.substring(0, 4);
      const firstSix = number.substring(0, 6);

      if (firstDigit === '4') return 'visa';
      if (['51', '52', '53', '54', '55'].includes(firstTwo)) return 'mastercard';
      if (parseInt(firstFour) >= 2221 && parseInt(firstFour) <= 2720) return 'mastercard';

      if (['540061', '540062', '516840', '454360'].some(b => firstSix.startsWith(b))) return 'akbank';
      if (['528240', '402962', '459751'].some(b => firstSix.startsWith(b))) return 'isbank';
      if (['515960', '524165', '544764'].some(b => firstSix.startsWith(b))) return 'yapikredi';
      if (['540670', '540672', '374427'].some(b => firstSix.startsWith(b))) return 'garanti';
      if (['627038', '627064', '415565'].some(b => firstSix.startsWith(b))) return 'ziraat';
      if (['428747', '535005'].some(b => firstSix.startsWith(b))) return 'halkbank';
      if (['498660'].some(b => firstSix.startsWith(b))) return 'vakifbank';
      if (['559482', '526717'].some(b => firstSix.startsWith(b))) return 'denizbank';
      if (['529826', '558636'].some(b => firstSix.startsWith(b))) return 'qnb';

      return 'unknown';
    }

    function getCardGradient(brand) {
      const gradients = {
        'ziraat': 'linear-gradient(135deg, #DC143C, #B22222)',
        'isbank': 'linear-gradient(135deg, #1E90FF, #4169E1)',
        'garanti': 'linear-gradient(135deg, #228B22, #32CD32)',
        'yapikredi': 'linear-gradient(135deg, #1E90FF, #4169E1)',
        'vakifbank': 'linear-gradient(135deg, #FFD700, #FFA500)',
        'halkbank': 'linear-gradient(135deg, #4169E1, #6495ED)',
        'akbank': 'linear-gradient(135deg, #FF6600, #FF8C00)',
        'qnb': 'linear-gradient(135deg, #191970, #4169E1)',
        'denizbank': 'linear-gradient(135deg, #228B22, #32CD32)',
        'visa': 'linear-gradient(135deg, #1A1F71, #00579F)',
        'mastercard': 'linear-gradient(135deg, #EB001B, #FF5F00)',
        'unknown': 'linear-gradient(135deg, #6C757D, #495057)'
      };
      return gradients[brand] || gradients['unknown'];
    }

    function openAddCardModal() {
      editingCardId = null;
      const modal = document.getElementById('addCardModal');
      const modalTitle = modal.querySelector('.modal-header h2');
      const submitBtn = modal.querySelector('.submit-card-btn');

      modalTitle.innerHTML = '<i class="ri-bank-card-line"></i> Yeni Kart Ekle';
      submitBtn.innerHTML = '<i class="ri-check-line"></i> Kartı Kaydet';
      submitBtn.onclick = saveCard;

      document.getElementById('addCardForm').reset();
      updateCardPreview();
      modal.classList.add('show');
    }

    function closeAddCardModal() {
      document.getElementById('addCardModal').classList.remove('show');
      editingCardId = null;
    }

    async function saveCard() {
      const submitBtn = document.getElementById('submitBtn');
      const holderName = document.getElementById('holderName').value.trim();
      const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
      const expiryDate = document.getElementById('expiryDate').value;
      const cvv = document.getElementById('cvv').value;

      if (!holderName || !cardNumber || !expiryDate || !cvv) {
        showToast('Lütfen tüm alanları doldurun', true);
        return;
      }

      if (cardNumber.length < 16) {
        showToast('Geçersiz kart numarası', true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div> Kaydediliyor...';

      try {
        const token = auth.getToken();
        const user = auth.getUser();
        const brand = detectCardBrand(cardNumber);

        const response = await fetch(`${CONFIG.API_BASE_URL}/credit-cards`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            data: {
              holderName: holderName,
              cardNumber: cardNumber,
              expiryDate: expiryDate,
              cardBrand: brand,
              user: user.id
            }
          })
        });

        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData?.error?.message || 'Kart kaydedilemedi');
        }

        showToast('Kart başarıyla kaydedildi');
        closeAddCardModal();
        await loadCards();

      } catch (error) {
        console.error('Kart kaydetme hatası:', error);
        showToast(error.message, true);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="ri-check-line"></i> Kartı Kaydet';
      }
    }

    function openEditCardModal(cardId) {
      const card = allCards.find(c => c.id === cardId);
      if (!card) return;

      const attrs = card.attributes || card;
      editingCardId = cardId;

      const modal = document.getElementById('addCardModal');
      const modalTitle = modal.querySelector('.modal-header h2');
      const submitBtn = modal.querySelector('.submit-card-btn');

      modalTitle.innerHTML = '<i class="ri-bank-card-line"></i> Kartı Düzenle';
      submitBtn.innerHTML = '<i class="ri-check-line"></i> Değişiklikleri Kaydet';
      submitBtn.onclick = updateCard;

      document.getElementById('holderName').value = attrs.holderName || '';
      document.getElementById('cardNumber').value = attrs.cardNumber || '';
      document.getElementById('expiryDate').value = attrs.expiryDate || '';
      document.getElementById('cvv').value = '';

      updateCardPreview();
      document.getElementById('addCardModal').classList.add('show');
    }

    async function updateCard() {
      const holderName = document.getElementById('holderName').value.trim();
      const expiryDate = document.getElementById('expiryDate').value.trim();

      if (!holderName || !expiryDate) {
        showToast('Lütfen gerekli alanları doldurun', true);
        return;
      }

      const submitBtn = document.querySelector('.submit-card-btn');
      submitBtn.innerHTML = '<i class="ri-loader-4-line ri-spin"></i> Güncelleniyor...';
      submitBtn.disabled = true;

      try {
        const token = auth.getToken();
        const response = await fetch(`${CONFIG.API_BASE_URL}/credit-cards/${editingCardId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            data: {
              holderName: holderName,
              expiryDate: expiryDate
            }
          })
        });

        if (!response.ok) throw new Error('Kart güncellenemedi');

        closeAddCardModal();
        await loadCards();
        showToast('Kart başarıyla güncellendi');

      } catch (error) {
        console.error('Kart güncelleme hatası:', error);
        showToast('Kart güncellenemedi', true);
      } finally {
        submitBtn.innerHTML = '<i class="ri-check-line"></i> Değişiklikleri Kaydet';
        submitBtn.disabled = false;
        editingCardId = null;
      }
    }

    async function deleteCard(cardId, holderName) {
      if (!confirm(`${holderName} adına kayıtlı kartı silmek istediğinizden emin misiniz?`)) return;

      try {
        const token = auth.getToken();
        const response = await fetch(`${CONFIG.API_BASE_URL}/credit-cards/${cardId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error('Kart silinemedi');

        allCards = allCards.filter(c => c.id !== cardId);
        renderCards();
        showToast('Kart başarıyla silindi');

      } catch (error) {
        console.error('Kart silme hatası:', error);
        showToast('Kart silinemedi', true);
      }
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      document.getElementById('toast-message').textContent = message;

      toast.classList.remove('error');
      if (isError) {
        toast.classList.add('error');
        icon.className = 'ri-error-warning-fill';
      } else {
        icon.className = 'ri-checkbox-circle-fill';
      }

      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    document.getElementById('addCardModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeAddCardModal();
    });
  </script>
</body>

</html>
